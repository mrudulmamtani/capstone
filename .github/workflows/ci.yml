name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: System deps (opencv-headless runtime)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest-cov

      - name: Lint (ruff)
        run: ruff check app tests
        continue-on-error: true

      - name: Syntax check every module
        run: python -m compileall -q app

      - name: Run tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite+pysqlite:///:memory:
          LLM_PROVIDER: stub
          APP_SECRET_KEY: ci-test-secret
        run: pytest -q --cov=app --cov-report=term-missing

  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20"]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci || npm install

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

  docker:
    name: Docker build smoke-test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f backend/Dockerfile -t vision-sop-api:ci backend
      - name: Build web image
        run: docker build -f frontend/Dockerfile -t vision-sop-web:ci frontend
